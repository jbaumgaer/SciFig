# Application Metadata
app_name: "SciFig"
version: "1.0.0"
organization: "YourOrganization" # Used for QSettings
website: "https://www.scifig.org"
authors:
  - "Your Name"
license: "MIT"

# UI/Window Defaults
window_title_prefix: "SciFig - "
default_window_geometry:
  x: 50
  y: 50
  width: 800
  height: 600
default_toolbar_area: "LeftToolBarArea" # Corresponds to Qt.ToolBarArea.LeftToolBarArea
default_dock_widget_area_properties: "RightDockWidgetArea" # Corresponds to Qt.DockWidgetArea.RightDockWidgetArea
default_dock_widget_area_history: "LeftDockWidgetArea" # Example for future
splash_screen_path: "src/assets/images/splash.png" # Example for future

ui:
  default_theme: "dark" # "dark", "light", etc.
  default_layout_mode: "free_form" # New: Default layout mode at startup

# Matplotlib Figure Defaults
figure:
  default_width: 8.5
  default_height: 6
  default_dpi: 150
  default_facecolor: "white"
  # auto_layout_enabled_default: true # Removed
  default_edgecolor: "black" # Example for future
  subplot_left: 0.125 # Example for future
  subplot_right: 0.9 # Example for future
  subplot_bottom: 0.11 # Example for future
  subplot_top: 0.88 # Example for future
  subplot_wspace: 0.2 # Example for future
  subplot_hspace: 0.2 # Example for future
  axes_facecolor: "white" # Example for future
  axes_edgecolor: "black" # Example for future
  font_family: "sans-serif" # Example for future
  font_size: 10 # Example for future
  line_width: 1.0 # Example for future
  marker_size: 6.0 # Example for future

# Layout & Grid Defaults
layout:
  default_margin: 0.1
  default_gutter: 0.08
  max_recent_files: 10
  default_grid_rows: 2
  default_grid_cols: 2
  grid_margin_top: 0.05
  grid_margin_bottom: 0.05
  grid_margin_left: 0.05
  grid_margin_right: 0.05
  grid_hspace: [] # Default to empty list for flexible spacing
  grid_wspace: [] # Default to empty list for flexible spacing
  constrained_w_space: 0.02 # Default constrained layout width space
  constrained_h_space: 0.02 # Default constrained layout height space

# Free Form Layout Defaults (new section)
free_form_layout:
  snap_grid_unit_x: 0.01
  snap_grid_unit_y: 0.01
  align_offset: 0.01
  distribute_spacing: 0.01

# Paths & Resources
paths:
  icon_base_dir: "src/assets/icons"
  layout_templates_dir: "templates/layouts"
  project_extension: ".sci"
  default_save_location: "~Documents/SciFig Projects" # Default for user, can be overridden by QSettings
  tool_icons: 
    select: "toolbar/Select.svg"
    direct_select: "toolbar/Direct_Select.svg"
    eyedropper: "toolbar/Eyedropper.svg"
    plot: "toolbar/Plot.svg"
    text: "toolbar/Text.svg"
    zoom: "toolbar/Zoom.svg"
  properties:
    alignment:
      align_horizontal_center: "properties/alignment/align_horizontal_center_24dp_E3E3E3.svg"
      align_horizontal_left: "properties/alignment/align_horizontal_left_24dp_E3E3E3.svg"
      align_horizontal_right: "properties/alignment/align_horizontal_right_24dp_E3E3E3.svg"
      align_vertical_bottom: "properties/alignment/align_vertical_bottom_24dp_E3E3E3.svg"
      align_vertical_center: "properties/alignment/align_vertical_center_24dp_E3E3E3.svg"
      align_vertical_top: "properties/alignment/align_vertical_top_24dp_E3E3E3.svg"
    distribute:
      horizontal_distribute: "properties/distribute/horizontal_distribute_24dp_E3E3E3.svg"
      vertical_distribute: "properties/distribute/vertical_distribute_24dp_E3E3E3.svg"
    snap_to_grid: "plots/add_chart_24dp_E3E3E3.svg" # Temporary icon for snap to grid

# Processing Defaults
processing:
  default_delimiter: "	"
  default_comment_char: "#"
  max_file_size_mb: 100
  max_lines_preview: 1000

# Tool Defaults
tool:
  default_active_tool: "selection" # Name of the tool
  selection:
    default_color: "red"
  zoom:
    zoom_factor: 1.15
    scroll_factor: 1 # In units of notches

# Debugging/Developer Options
debug:
  log_level: "INFO" # "DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"
  enable_dev_tools: false
  show_perf_metrics: false

# Logging Configuration
logging:
  level: "DEBUG" # Default logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  file_output: true # Enable/disable logging to a file
  file_path: "app.log" # Path to the log file
  file_max_bytes: 10485760 # 10 MB (for RotatingFileHandler)
  file_backup_count: 5 # Keep 5 backup log files
  console_output: true # Enable/disable logging to console
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"

# Theme Definitions
themes:
  dark:
    style: "Fusion"
    palette:
      Window: [53, 53, 53]
      WindowText: [255, 255, 255]
      Base: [25, 25, 25]
      AlternateBase: [53, 53, 53]
      ToolTipBase: [255, 255, 255]
      ToolTipText: [255, 255, 255]
      Text: [255, 255, 255]
      Button: [53, 53, 53]
      ButtonText: [255, 255, 255]
      BrightText: [255, 0, 0]
      Link: [42, 130, 218]
      Highlight: [42, 130, 218]
      HighlightedText: [0, 0, 0]
      PlaceholderText: [160, 160, 160]
  light:
    style: "Fusion"
    palette:
      Window: [240, 240, 240]
      WindowText: [0, 0, 0]
      Base: [255, 255, 255]
      AlternateBase: [220, 220, 220]
      ToolTipBase: [255, 255, 220]
      ToolTipText: [0, 0, 0]
      Text: [0, 0, 0]
      Button: [240, 240, 240]
      ButtonText: [0, 0, 0]
      BrightText: [255, 0, 0]
      Link: [0, 0, 238]
      Highlight: [51, 153, 255]
      HighlightedText: [255, 255, 255]
      PlaceholderText: [128, 128, 128]